name: Autograding Tests

on:
  push:
    branches: [main]

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Task 1: Session Storage"
        id: task1
        run: pytest tests/test_session.py -v
        if: always()

      - name: "Task 2: Rate Limiter"
        id: task2
        run: pytest tests/test_rate_limiter.py -v
        if: always()

      - name: "Task 3: Task Queue"
        id: task3
        run: pytest tests/test_queue.py -v
        if: always()

      - name: "Bonus: Sliding Window"
        id: bonus
        run: pytest tests/test_sliding_window.py -v
        if: always()

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          TASK1_RESULTS: "${{ steps.task1.outcome }}"
          TASK2_RESULTS: "${{ steps.task2.outcome }}"
          TASK3_RESULTS: "${{ steps.task3.outcome }}"
          BONUS_RESULTS: "${{ steps.bonus.outcome }}"
        with:
          runners: task1,task2,task3,bonus
        if: always()
